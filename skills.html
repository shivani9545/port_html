<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Skills</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f9;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        h1 {
            margin-top: 40px;
            color: #333;
        }

        .skills-container {
            width: 60%;
            margin: 40px auto;
            text-align: left;
        }

        .skill {
            margin: 20px 0;
        }

        .skill-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .bar {
            width: 100%;
            background: #ddd;
            border-radius: 20px;
            overflow: hidden;
        }

        .progress {
            height: 20px;
            background: #4CAF50;
            width: 0;
            border-radius: 20px;
            animation: fill 2s forwards;
        }

        @keyframes fill {
            from { width: 0; }
        }
    </style>
</head>
<body>

    <h1>My Skills</h1>

    <div class="skills-container">

        <div class="skill">
            <div class="skill-name">HTML</div>
            <div class="bar">
                <div class="progress" style="width: 90%;"></div>
            </div>
        </div>

        <div class="skill">
            <div class="skill-name">CSS</div>
            <div class="bar">
                <div class="progress" style="width: 80%;"></div>
            </div>
        </div>

        <div class="skill">
            <div class="skill-name">JavaScript</div>
            <div class="bar">
                <div class="progress" style="width: 60%;"></div>
            </div>
        </div>

        <div class="skill">
            <div class="skill-name">C / C++</div>
            <div class="bar">
                <div class="progress" style="width: 75%;"></div>
            </div>
        </div>

    </div>

</body>
</html>
